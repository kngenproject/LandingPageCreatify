<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Creatify — Akses aplikasi undangan digital. Kelola acara, tamu, dan RSVP dalam satu platform.">
<meta name="theme-color" content="#b89a6a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Creatify">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Creatify • Masuk ke App</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg:       #f5f0e8;
    --blue:     #b89a6a;
    --blue-lt:  #ede6d6;
    --sky:      #d4b896;
    --sky-lt:   #f2ede3;
    --deep:     #6b4f2e;
    --text:     #2c2118;
    --muted:    #9a8570;
    --white:    #fdfaf5;
    --error-bg: #fef2f2;
    --error-border: #f5c6c6;
    --error-text: #c95a5a;
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* background elegance */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 320px;
    height: 320px;
    top: -80px;
    right: -60px;
    background: radial-gradient(circle, #d4b89666, transparent 70%);
  }
  body::after {
    width: 260px;
    height: 260px;
    bottom: -60px;
    left: -40px;
    background: radial-gradient(circle, #c9a87866, transparent 70%);
  }

  .shell {
    position: relative;
    z-index: 2;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6vh 20px 5vh;
    max-width: 500px;
    margin: 0 auto;
  }

  /* header */
  .top {
    text-align: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s forwards;
  }
  .logo-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--blue-lt);
    border: 1.5px solid #c9aa82;
    padding: 4px 14px;
    border-radius: 100px;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--deep);
    margin-bottom: 12px;
  }
  .logo-pill::before, .logo-pill::after {
    content: '✦';
    font-size: 6px;
    color: var(--blue);
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(60px, 15vw, 96px);
    font-weight: 600;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--blue), var(--sky));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-top: 8px;
  }

  /* login card utama */
  .login-card {
    background: var(--white);
    border-radius: 36px;
    padding: 32px 28px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(80, 60, 35, 0.1), 0 4px 12px rgba(0,0,0,0.02);
    border: 1px solid #e4d5c2;
    transition: all 0.2s ease;
    opacity: 0;
    animation: fadeUp 0.7s 0.2s forwards;
  }

  .card-icon {
    font-size: 48px;
    text-align: center;
    display: block;
    margin-bottom: 8px;
  }

  .login-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    color: var(--text);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .login-sub {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* form */
  .form-group {
    margin-bottom: 18px;
  }
  .input-label {
    font-size: 12px;
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    color: var(--deep);
  }
  .login-card input {
    width: 100%;
    padding: 14px 18px;
    background: #fefaf5;
    border: 1.5px solid #e2cfbb;
    border-radius: 24px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    color: var(--text);
    transition: 0.2s;
    outline: none;
  }
  .login-card input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(184,154,106,0.2);
    background: white;
  }
  .login-card input::placeholder {
    color: #cbbca8;
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--blue), var(--sky));
    border: none;
    border-radius: 40px;
    color: white;
    font-weight: 700;
    font-size: 15px;
    font-family: 'Nunito', sans-serif;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 6px;
    box-shadow: 0 8px 18px rgba(150,110,70,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .login-btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.02);
    box-shadow: 0 12px 26px rgba(150,110,70,0.35);
  }
  .login-btn:active {
    transform: scale(0.97);
  }
  .login-btn:disabled {
    opacity: 0.7;
    transform: none;
    cursor: default;
    box-shadow: none;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-message {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: 20px;
    padding: 10px 15px;
    font-size: 12px;
    color: var(--error-text);
    margin-bottom: 18px;
    text-align: center;
    display: none;
  }
  .error-message.show {
    display: block;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e2cfbb;
  }
  .divider span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .action-links {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .link-btn {
    background: none;
    border: none;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: 0.2s;
    padding: 5px 0;
  }
  .link-btn:hover {
    color: var(--deep);
    text-decoration: underline;
  }

  .invite-helper {
    text-align: center;
    margin-top: 24px;
    padding-top: 12px;
    border-top: 1px dashed #e2cfbb;
  }
  .helper-text {
    font-size: 12px;
    color: #b09478;
    margin-bottom: 8px;
  }
  .pill-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f3ecdf;
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    color: #8e6a48;
    text-decoration: none;
    transition: 0.2s;
    border: 1px solid #dccdb8;
  }
  .pill-link:hover {
    background: var(--blue);
    color: white;
    border-color: var(--blue);
  }

  /* footer */
  footer {
    margin-top: 32px;
    font-size: 10px;
    color: #bbaa94;
    text-align: center;
    letter-spacing: 0.06em;
    opacity: 0;
    animation: fadeUp 0.5s 0.3s forwards;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* responsive */
  @media (max-width: 480px) {
    .shell {
      padding: 4vh 16px;
    }
    .login-card {
      padding: 24px 20px;
    }
  }
</style>
</head>
<body>

<div class="shell">
  <div class="top">
    <div class="logo-pill">Studio Digital</div>
    <h1>Creat<em>ify</em></h1>
    <div class="tagline">Kelola acara & undangan dalam satu app</div>
  </div>

  <!-- LOGIN CARD INTI -->
  <div class="login-card">
    <span class="card-icon">🔐✨</span>
    <h2>Masuk ke App</h2>
    <div class="login-sub">Gunakan akun Creatifymu</div>

    <div id="loginErrorBox" class="error-message"></div>

    <div class="form-group">
      <label class="input-label">Email</label>
      <input type="email" id="emailInput" placeholder="contoh@email.com" autocomplete="email" inputmode="email">
    </div>
    <div class="form-group">
      <label class="input-label">Kata Sandi</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginButton">
      Masuk ke Dashboard
    </button>

    <div class="divider"><span>atau</span></div>

    <div class="action-links">
      <button class="link-btn" id="registerBtn">📝 Daftar akun baru</button>
      <button class="link-btn" id="forgotBtn">❓ Lupa password?</button>
    </div>

    <!-- link ringan ke pembuat undangan (akses cepat) -->
    <div class="invite-helper">
      <div class="helper-text">💡 Belum punya undangan digital?</div>
      <button class="pill-link" id="quickInviteBtn">
        ✨ Buat Undangan Sekarang
      </button>
      <div style="font-size: 10px; margin-top: 10px; color: #b8a080;">Gratis & mudah, tanpa login terlebih dahulu</div>
    </div>
  </div>

  <footer>© 2026 Creatify · platform undangan digital & manajemen acara</footer>
</div>

<script type="module">
  // ======================= FIREBASE CONFIG =======================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDSiWxxT-qgM_tStgaw7D8AuNaDgI3mkcY",
    authDomain:        "creatify.my.id",
    projectId:         "landing-page-creatify",
    storageBucket:     "landing-page-creatify.firebasestorage.app",
    messagingSenderId: "142614580975",
    appId:             "1:142614580975:web:368ba820dbfc5f69ca151a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ======================= APP PATHS =======================
  const APP_PATHS = {
    dashboard:      '/app/dashboard/',
    register:       '/app/register/',
    forgotPassword: '/app/forgot-password/',
    invitationBuilder: '/undangan.html'     // generator link undangan
  };

  // ======================= AUTH STATE (redirect jika sudah login) =======================
  let isFirstCheck = true;
  onAuthStateChanged(auth, (user) => {
    if (isFirstCheck) {
      isFirstCheck = false;
      // Jangan redirect saat pertama load, biarkan user tetap di halaman login.
      return;
    }
    if (user) {
      // user baru login -> redirect ke dashboard
      window.location.href = APP_PATHS.dashboard;
    }
  });

  // ======================= UI ELEMENTS =======================
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn = document.getElementById('loginButton');
  const errorBox = document.getElementById('loginErrorBox');
  const registerBtn = document.getElementById('registerBtn');
  const forgotBtn = document.getElementById('forgotBtn');
  const quickInviteBtn = document.getElementById('quickInviteBtn');

  // helpers
  function showError(message) {
    errorBox.textContent = message;
    errorBox.classList.add('show');
    setTimeout(() => {
      errorBox.classList.remove('show');
    }, 3800);
  }

  function clearError() {
    errorBox.classList.remove('show');
    errorBox.textContent = '';
  }

  function getFirebaseErrorMessage(code) {
    const map = {
      'auth/invalid-email':        'Format email tidak valid.',
      'auth/user-not-found':       'Email tidak terdaftar.',
      'auth/wrong-password':       'Password salah. Coba lagi.',
      'auth/invalid-credential':   'Email atau password salah.',
      'auth/too-many-requests':    'Terlalu banyak percobaan. Tunggu sebentar.',
      'auth/user-disabled':        'Akun telah dinonaktifkan.',
      'auth/network-request-failed': 'Gagal terhubung ke server. Cek internet.',
    };
    return map[code] || 'Login gagal, periksa email & password.';
  }

  // ======================= LOGIN HANDLER =======================
  async function handleLogin() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      showError('Email dan password harus diisi.');
      return;
    }

    clearError();

    // UI loading
    loginBtn.disabled = true;
    const originalBtnText = loginBtn.innerHTML;
    loginBtn.innerHTML = '<div class="spinner"></div> Memeriksa...';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged akan handle redirect setelah login sukses
      // (tapi kita tidak perlu redirect manual karena observer akan melakukan redirect)
      // Namun karena observer memiliki flag firstCheck = false, setelah login sukses akan redirect.
      // Catatan: ketika signIn berhasil, observer akan terpanggil dengan user != null, kemudian arahkan ke dashboard.
    } catch (error) {
      loginBtn.disabled = false;
      loginBtn.innerHTML = originalBtnText;
      const friendlyMsg = getFirebaseErrorMessage(error.code);
      showError(friendlyMsg);
      console.warn(error.code);
    }
  }

  // ======================= NAVIGATION =======================
  function goToRegister() {
    window.location.href = APP_PATHS.register;
  }
  function goToForgot() {
    window.location.href = APP_PATHS.forgotPassword;
  }
  function goToInvitationBuilder() {
    window.location.href = APP_PATHS.invitationBuilder;
  }

  // ======================= EVENT LISTENERS =======================
  loginBtn.addEventListener('click', handleLogin);
  registerBtn.addEventListener('click', goToRegister);
  forgotBtn.addEventListener('click', goToForgot);
  quickInviteBtn.addEventListener('click', goToInvitationBuilder);

  // enter key submit
  const handleEnter = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleLogin();
    }
  };
  emailInput.addEventListener('keypress', handleEnter);
  passwordInput.addEventListener('keypress', handleEnter);

  // sedikit sentuhan: auto focus email
  setTimeout(() => {
    emailInput.focus();
  }, 200);

  // optional: styling untuk card lebih mulus
  console.log("✨ Creatify — Login App siap digunakan");
</script>

<!-- PWA service worker (opsional, tetap support offline) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('✅ SW registered:', reg.scope))
        .catch(err => console.log('❌ SW error:', err));
    });
  }
</script>
</body>
</html>
