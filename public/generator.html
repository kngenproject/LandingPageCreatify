<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Creatify Undangan — Generator Link Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #fef7f0;
            padding: 20px 12px 48px;
            min-height: 100vh;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        /* Header Mobile First */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #b16e4a, #8e4e32);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo span {
            background: none;
            color: #c27e5c;
            -webkit-background-clip: unset;
        }

        .back-btn {
            background: rgba(183, 110, 78, 0.12);
            color: #b76e4e;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
            display: inline-block;
        }
        .back-btn:active {
            transform: scale(0.96);
            background: rgba(183, 110, 78, 0.25);
        }

        /* Cards */
        .main-card {
            background: white;
            border-radius: 32px;
            padding: 20px 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.03);
            margin-bottom: 24px;
            transition: all 0.2s;
        }

        h1 {
            font-size: 1.85rem;
            color: #3b2a21;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .sub {
            color: #8f6e58;
            font-size: 0.9rem;
            border-bottom: 2px solid #f5e6dd;
            padding-bottom: 14px;
            margin-bottom: 22px;
        }

        /* Warning */
        .warning {
            background: #fff2e7;
            padding: 14px 16px;
            border-radius: 24px;
            font-size: 13px;
            color: #b35f3a;
            border-left: 4px solid #e4a37e;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .warning code {
            background: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            color: #b76e4e;
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }
        label {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #3b2a21;
        }
        textarea {
            width: 100%;
            padding: 16px;
            font-size: 16px; /* prevent zoom on iOS */
            border: 1.5px solid #eedbcb;
            border-radius: 24px;
            font-family: 'Courier New', 'SF Mono', monospace;
            background: #fefaf7;
            transition: 0.2s;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #c27e5c;
            box-shadow: 0 0 0 3px rgba(194, 126, 92, 0.15);
        }

        /* Button Group — touch friendly */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn {
            background: #c27e5c;
            border: none;
            padding: 12px 18px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1 0 auto;
            min-height: 48px;
            touch-action: manipulation;
        }
        .btn:active {
            transform: scale(0.96);
            background: #a86242;
        }
        .btn-secondary {
            background: #decbbd;
            color: #4f3527;
        }
        .btn-secondary:active {
            background: #cdb5a4;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #c27e5c;
            color: #c27e5c;
        }
        .btn-outline:active {
            background: #fcf1ea;
        }
        .btn-danger {
            background: #d08c6b;
        }
        .btn-danger:active {
            background: #bc6e4a;
        }

        /* Result & link list */
        .result-area, .saved-card {
            background: #fef9f4;
            border-radius: 28px;
            padding: 18px;
            margin-top: 4px;
        }
        .stats-info {
            background: #f6ede5;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: #5b3e2c;
            margin-bottom: 16px;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 2px;
        }
        .link-item {
            background: white;
            padding: 16px;
            border-radius: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #f0e2d8;
            transition: all 0.2s;
        }
        .link-info {
            flex: 2;
            min-width: 140px;
        }
        .link-name {
            font-weight: 800;
            font-size: 1rem;
            color: #2c241e;
            word-break: break-word;
        }
        .link-url {
            font-size: 10px;
            color: #b07252;
            word-break: break-all;
            font-family: monospace;
            margin-top: 6px;
            background: #fef4ed;
            padding: 4px 6px;
            border-radius: 12px;
            display: inline-block;
        }
        .link-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .small-btn {
            background: #f1e2d8;
            border: none;
            padding: 8px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 12px;
            color: #5c3a28;
            cursor: pointer;
            transition: 0.2s;
            min-height: 40px;
            touch-action: manipulation;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .small-btn:active {
            background: #e0cec0;
            transform: scale(0.96);
        }

        /* Modal Mobile */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: white;
            border-radius: 36px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid #f0e0d4;
        }
        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #3b2a21;
        }
        .close-modal {
            background: #f0e0d4;
            border: none;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .close-modal:active {
            background: #decbbc;
        }
        .modal-body {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }
        .modal-body iframe {
            width: 100%;
            height: 420px;
            border-radius: 24px;
            border: 1px solid #eedbcb;
            background: white;
        }
        #openNewTabBtn {
            background: #c27e5c;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 60px;
            font-weight: 600;
            margin-top: 12px;
            font-size: 15px;
        }

        /* Toast Mobile */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 16px;
            right: 16px;
            background: #2c7a5e;
            color: white;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            z-index: 2100;
            animation: slideUp 0.25s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(20px); visibility: hidden; }
        }

        /* Misc */
        small {
            font-size: 11px;
            color: #a38773;
            display: inline-block;
            margin-top: 6px;
        }
        .empty-message {
            text-align: center;
            padding: 28px;
            color: #a88972;
            font-weight: 500;
        }
        @media (max-width: 480px) {
            body { padding: 14px 10px 40px; }
            .main-card { padding: 18px; }
            .btn-group { gap: 10px; }
            .btn { padding: 11px 14px; font-size: 0.85rem; }
            .link-item { padding: 12px; }
            .small-btn { padding: 6px 12px; font-size: 11px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Creat<span>ify</span></div>
        <a href="/app/dashboard/" class="back-btn">← Dashboard</a>
    </div>

    <div class="main-card">
        <h1>🔗 Undangan<br>Instan</h1>
        <div class="sub">personal link untuk setiap tamu</div>

        <div class="warning">
            💡 <strong>Tips:</strong> Tulis nama tamu (1 per baris). Setiap nama mendapatkan link unik.<br>
            Format: <code>/undangan.html?to=Nama</code>
        </div>

        <div class="form-group">
            <label>📋 Daftar Nama Tamu</label>
            <textarea id="guestNames" rows="5" placeholder="Ahmad Fauzi&#10;Siti Nurhaliza&#10;Budi Santoso&#10;Dewi Lestari"></textarea>
            <small>✨ Pisahkan setiap nama dengan baris baru</small>
        </div>

        <div class="btn-group">
            <button class="btn" id="generateBtn">✨ Generate Link</button>
            <button class="btn btn-secondary" id="copyAllBtn">📋 Salin Semua</button>
            <button class="btn btn-secondary" id="saveToStorageBtn">💾 Simpan ke HP</button>
            <button class="btn btn-outline" id="resetBtn">🗑️ Reset Form</button>
            <button class="btn btn-danger" id="clearDataBtn">⚠️ Hapus Semua Data</button>
            <button class="btn btn-outline" id="exportDataBtn">📎 Export JSON</button>
        </div>

        <div id="resultArea" class="result-area" style="display: none;">
            <div class="stats-info" id="statsInfo"></div>
            <div class="link-list" id="linkList"></div>
        </div>
    </div>

    <!-- Data tersimpan -->
    <div class="main-card" id="savedDataCard" style="display: none;">
        <h2 style="font-size: 1.4rem;">📦 Arsip Undangan</h2>
        <div class="stats-info" id="savedStats"></div>
        <div class="link-list" id="savedList"></div>
    </div>
</div>

<!-- Modal Preview -->
<div id="previewModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">👁️ Preview Undangan</h3>
            <button class="close-modal" id="closeModalBtn">✕</button>
        </div>
        <div class="modal-body">
            <iframe id="previewFrame" src="about:blank" title="Preview undangan"></iframe>
            <button id="openNewTabBtnMobile">🔗 Buka di Tab Baru</button>
        </div>
    </div>
</div>

<script>
    // ==================== KONFIGURASI & STORAGE KEYS ====================
    const STORAGE_KEYS = {
        invitations: 'creatify_invitations',
        views: 'creatify_views',
        rsvp: 'creatify_rsvp'
    };

    let currentPreviewUrl = '';

    // ==================== UTILITIES ====================
    function getBaseUrl() {
        return window.location.origin + '/undangan.html';
    }

    function showToast(msg, type = 'success') {
        const existingToast = document.querySelector('.toast');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        if (type === 'error') toast.style.backgroundColor = '#bc6e4a';
        if (type === 'warning') toast.style.backgroundColor = '#df9f5e';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'fadeOut 0.2s ease';
            setTimeout(() => toast.remove(), 200);
        }, 2800);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== GENERATE LINKS from textarea ====================
    function generateLinksFromText() {
        const rawText = document.getElementById('guestNames').value;
        if (!rawText.trim()) return [];
        const names = rawText.split(/\r?\n/).filter(line => line.trim().length > 0);
        const baseUrl = getBaseUrl();
        return names.map(name => {
            const trimmed = name.trim();
            return {
                name: trimmed,
                url: `${baseUrl}?to=${encodeURIComponent(trimmed)}`,
                createdAt: new Date().toISOString()
            };
        });
    }

    // ==================== CRUD LOCALSTORAGE ====================
    function loadInvitations() {
        return JSON.parse(localStorage.getItem(STORAGE_KEYS.invitations) || '[]');
    }
    function saveInvitations(invitations) {
        localStorage.setItem(STORAGE_KEYS.invitations, JSON.stringify(invitations));
        updateSavedDataDisplay();
    }
    function deleteSingleInvitation(name) {
        if (!confirm(`Hapus undangan untuk "${name}" dari penyimpanan?`)) return;
        let invites = loadInvitations();
        const filtered = invites.filter(inv => inv.name !== name);
        if (filtered.length === invites.length) {
            showToast('Nama tidak ditemukan', 'warning');
            return;
        }
        saveInvitations(filtered);
        showToast(`✅ Undangan "${name}" dihapus`, 'success');
        // Update stats di generated area jika aktif
        updateGeneratedStatsInfo();
    }
    function clearAllData() {
        if (confirm('⚠️ PERINGATAN! Hapus SEMUA data undangan tersimpan? Tindakan ini permanen.')) {
            localStorage.removeItem(STORAGE_KEYS.invitations);
            updateSavedDataDisplay();
            showToast('Semua data terhapus', 'success');
            updateGeneratedStatsInfo();
            const resultArea = document.getElementById('resultArea');
            if (resultArea && document.getElementById('linkList').children.length === 0) {
                resultArea.style.display = 'none';
            }
        }
    }
    function saveCurrentToDatabase() {
        const links = generateLinksFromText();
        if (links.length === 0) {
            showToast('Tidak ada nama untuk disimpan', 'error');
            return;
        }
        let existing = loadInvitations();
        let newEntries = 0;
        links.forEach(link => {
            const exists = existing.some(ex => ex.name.toLowerCase() === link.name.toLowerCase());
            if (!exists) {
                existing.push(link);
                newEntries++;
            }
        });
        if (newEntries === 0) {
            showToast('⚠️ Semua nama sudah tersimpan di arsip', 'warning');
            return;
        }
        saveInvitations(existing);
        showToast(`✅ ${newEntries} undangan baru tersimpan`, 'success');
        updateSavedDataDisplay();
        updateGeneratedStatsInfo();
    }

    // ==================== RENDER LINKS (NO INNERHTML ONCLICK) ====================
    function renderLinks(links, containerId, showActions = true) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        if (!links.length) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-message';
            emptyDiv.innerText = '✨ Belum ada link, generate dulu ya.';
            container.appendChild(emptyDiv);
            return;
        }
        links.forEach(link => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'link-item';

            const infoDiv = document.createElement('div');
            infoDiv.className = 'link-info';
            const nameSpan = document.createElement('div');
            nameSpan.className = 'link-name';
            nameSpan.innerText = link.name;
            const urlSpan = document.createElement('div');
            urlSpan.className = 'link-url';
            urlSpan.innerText = link.url;
            infoDiv.appendChild(nameSpan);
            infoDiv.appendChild(urlSpan);
            if (link.createdAt) {
                const dateSpan = document.createElement('div');
                dateSpan.style.fontSize = '10px';
                dateSpan.style.color = '#9a8570';
                dateSpan.style.marginTop = '6px';
                dateSpan.innerText = `🕐 Dibuat: ${new Date(link.createdAt).toLocaleString('id-ID')}`;
                infoDiv.appendChild(dateSpan);
            }

            itemDiv.appendChild(infoDiv);

            if (showActions) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'link-actions';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'small-btn';
                copyBtn.innerHTML = '📋 Salin';
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(link.url).then(() => showToast('Link disalin', 'success')).catch(() => showToast('Gagal menyalin', 'error'));
                });

                const previewBtn = document.createElement('button');
                previewBtn.className = 'small-btn';
                previewBtn.innerHTML = '👁️ Preview';
                previewBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPreviewModal(link.url, link.name);
                });

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'small-btn';
                deleteBtn.innerHTML = '🗑️ Hapus';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSingleInvitation(link.name);
                });

                actionsDiv.appendChild(copyBtn);
                actionsDiv.appendChild(previewBtn);
                actionsDiv.appendChild(deleteBtn);
                itemDiv.appendChild(actionsDiv);
            }
            container.appendChild(itemDiv);
        });
    }

    // ==================== UPDATE DISPLAYS ====================
    function updateSavedDataDisplay() {
        const invitations = loadInvitations();
        const savedCard = document.getElementById('savedDataCard');
        const savedStatsDiv = document.getElementById('savedStats');
        const savedListDiv = document.getElementById('savedList');
        if (invitations.length > 0) {
            savedCard.style.display = 'block';
            savedStatsDiv.innerHTML = `📦 ${invitations.length} undangan tersimpan di perangkat`;
            renderLinks(invitations, 'savedList', true);
        } else {
            savedCard.style.display = 'none';
        }
    }

    function updateGeneratedStatsInfo() {
        const resultArea = document.getElementById('resultArea');
        if (resultArea.style.display === 'block') {
            const currentLinks = generateLinksFromText();
            const savedCount = loadInvitations().length;
            const statsDiv = document.getElementById('statsInfo');
            if (statsDiv) {
                statsDiv.innerHTML = `📊 ${currentLinks.length} link dibuat saat ini | 💾 ${savedCount} tersimpan di arsip`;
            }
        }
    }

    function generateAndDisplay() {
        const links = generateLinksFromText();
        const resultArea = document.getElementById('resultArea');
        const statsInfo = document.getElementById('statsInfo');
        const savedCount = loadInvitations().length;
        if (links.length > 0) {
            resultArea.style.display = 'block';
            statsInfo.innerHTML = `📊 ${links.length} link dibuat | 💾 ${savedCount} tersimpan di arsip`;
            renderLinks(links, 'linkList', true);
        } else {
            resultArea.style.display = 'none';
            showToast('Masukkan nama tamu terlebih dahulu', 'error');
        }
    }

    function copyAllGenerated() {
        const links = generateLinksFromText();
        if (!links.length) {
            showToast('Tidak ada link untuk disalin', 'error');
            return;
        }
        const allUrls = links.map(l => l.url).join('\n');
        navigator.clipboard.writeText(allUrls);
        showToast(`✅ ${links.length} link disalin ke clipboard`, 'success');
    }

    function resetForm() {
        if (confirm('Reset semua nama tamu di form? Data tersimpan tidak akan hilang.')) {
            document.getElementById('guestNames').value = '';
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'none';
            showToast('Form dikosongkan', 'success');
        }
    }

    function exportToJson() {
        const invitations = loadInvitations();
        if (!invitations.length) {
            showToast('Tidak ada data untuk diekspor', 'warning');
            return;
        }
        const exportData = {
            invitations: invitations,
            exportDate: new Date().toISOString(),
            total: invitations.length
        };
        const dataStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `creatify_undangan_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('📁 Data berhasil diekspor', 'success');
    }

    // ==================== MODAL PREVIEW MOBILE ====================
    function openPreviewModal(url, guestName) {
        currentPreviewUrl = url;
        const modal = document.getElementById('previewModal');
        const iframe = document.getElementById('previewFrame');
        const modalTitle = document.getElementById('modalTitle');
        iframe.src = url;
        modalTitle.innerText = `👁️ Preview - ${guestName}`;
        modal.style.display = 'flex';
    }
    function closePreviewModal() {
        const modal = document.getElementById('previewModal');
        const iframe = document.getElementById('previewFrame');
        iframe.src = 'about:blank';
        modal.style.display = 'none';
    }
    function openInNewTab() {
        if (currentPreviewUrl) {
            window.open(currentPreviewUrl, '_blank');
        } else {
            showToast('Link tidak tersedia', 'error');
        }
    }

    // ==================== INIT & SAMPLE DATA ====================
    function initSampleDataIfNeeded() {
        let invitations = loadInvitations();
        if (invitations.length === 0) {
            const sampleNames = ['Ahmad Fauzi', 'Siti Nurhaliza', 'Budi Santoso', 'Dewi Lestari'];
            const baseUrl = getBaseUrl();
            const sampleData = sampleNames.map(name => ({
                name: name,
                url: `${baseUrl}?to=${encodeURIComponent(name)}`,
                createdAt: new Date().toISOString()
            }));
            localStorage.setItem(STORAGE_KEYS.invitations, JSON.stringify(sampleData));
        }
    }

    function setTextareaFromStorage() {
        const stored = loadInvitations();
        if (stored.length) {
            const namesString = stored.map(inv => inv.name).join('\n');
            document.getElementById('guestNames').value = namesString;
        } else {
            // fallback placeholder
            document.getElementById('guestNames').value = "Ahmad Fauzi\nSiti Nurhaliza\nBudi Santoso";
        }
    }

    function bindEvents() {
        document.getElementById('generateBtn').addEventListener('click', generateAndDisplay);
        document.getElementById('copyAllBtn').addEventListener('click', copyAllGenerated);
        document.getElementById('saveToStorageBtn').addEventListener('click', saveCurrentToDatabase);
        document.getElementById('resetBtn').addEventListener('click', resetForm);
        document.getElementById('clearDataBtn').addEventListener('click', clearAllData);
        document.getElementById('exportDataBtn').addEventListener('click', exportToJson);
        const closeModalBtn = document.getElementById('closeModalBtn');
        const openNewTabBtn = document.getElementById('openNewTabBtnMobile');
        if (closeModalBtn) closeModalBtn.addEventListener('click', closePreviewModal);
        if (openNewTabBtn) openNewTabBtn.addEventListener('click', openInNewTab);
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('previewModal');
            if (e.target === modal) closePreviewModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePreviewModal();
        });
    }

    function init() {
        initSampleDataIfNeeded();
        setTextareaFromStorage();
        updateSavedDataDisplay();
        bindEvents();
        // optional: jika ingin langsung tampilkan hasil dari textarea awal
        const initialLinks = generateLinksFromText();
        if (initialLinks.length > 0) {
            generateAndDisplay(); // tampilkan awal
        }
        showToast('✨ Selamat datang! Generator siap digunakan', 'success');
    }

    init();
</script>
</body>
</html>
